<!doctype html>
<html lang="">

<head>
    <meta charset="utf-8" />
    <title>Build-a-Hare</title>
    <meta name="description" content="" />
    <meta name="keywords" content="" />
    <meta name="author" content="" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">

    <!-- Scripts -->
    <script src="script.js" type="text/javascript"></script>
    <link href="style.css" rel="stylesheet" />
</head>

<body onload="setUp()">
    <header>
        <h1>Build-a-Hare</h1>
        <p>Design your dream rabbit friend! Choose a color, name and accessories!</p>
    </header>
    <main>
        <div id="outputRabbit">
            <p id="rabbitName"><span style="color: #0005">Your rabbit's name...</span></p>
            <img src="images/rabbit.png" id="mainRabbit" class="default" alt="An illustration of your new pet rabbit.">
            <div id="accessoryBox">
                <img src="images/accessory1.png" class="disabledEffect" alt="" id="topHatImg">
                <img src="images/accessory2.png" class="disabledEffect" alt="" id="cuteCapImg">
                <img src="images/accessory3.png" class="disabledEffect" alt="" id="bowTieImg">
                <img src="images/accessory4.png" class="disabledEffect" alt="" id="walkingCaneImg">
                <img src="images/accessory5.png" class="disabledEffect" alt="" id="handbagImg">
            </div>
        </div>
        <form id="settingsPane" onsubmit="return false;">
            <fieldset>
                <legend>Rabbit - 28$</legend>

                <label for="nameField"><span style='color: red'>*</span> Name:
                    <input type="text" id="nameField" required>
                </label><br>
                <br>
                <p><span style='color: red'>*</span> What's its color?</label>
                <br>
                <input type="radio" id="rabbitColorRed" name="rabbitColor" value="red" required>
                <label for="rabbitColorRed">Red</label><br>
                <input type="radio" id="rabbitColorBlue" name="rabbitColor" value="blue" required>
                <label for="rabbitColorBlue">Blue</label><br>
                <input type="radio" id="rabbitColorGreen" name="rabbitColor" value="green" required>
                <label for="rabbitColorGreen">Green</label><br>
                <input type="radio" id="rabbitColorYellow" name="rabbitColor" value="yellow" required>
                <label for="rabbitColorYellow">Yellow</label><br>
            </fieldset>
            <br>
            <fieldset>
                <legend>Extras - 3$ Each</legend>
                <label>Choose accessories for your rabbit:</label>
                <br>
                <input type="checkbox" id="topHat" name="accessories" value="Top Hat">
                <label for="topHat">Top Hat</label><br>
                <input type="checkbox" id="cuteCap" name="accessories" value="Cute Cap">
                <label for="cuteCap">Cute Cap</label><br>
                <input type="checkbox" id="bowTie" name="accessories" value="Bow Tie">
                <label for="bowTie">Bow Tie</label><br>
                <input type="checkbox" id="walkingCane" name="accessories" value="Walking Cane">
                <label for="walkingCane">Walking Cane</label><br>
                <input type="checkbox" id="handbag" name="accessories" value="Handbag">
                <label for="handbag">Handbag</label><br>
            </fieldset>
            <br>
            <button id="submitButton" onclick="buildRabbit()" class="disabledEffect">Build my Hare!</button>
        </form>
    </main>


    <div id="resultBox" hidden="true">
        <p id="results"></p>
        <button onclick="setResultsHidden(true)">Ok</button>
    </div>
</body>

</html>
